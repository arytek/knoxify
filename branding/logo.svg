<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Project Zomboid Map Tool Logo">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#252d16"/>
      <stop offset="1" stop-color="#10150a"/>
    </linearGradient>
    <linearGradient id="paper" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#d8c58e"/>
      <stop offset="1" stop-color="#b39c61"/>
    </linearGradient>
    <linearGradient id="grass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#617330"/>
      <stop offset="1" stop-color="#475626"/>
    </linearGradient>
    <linearGradient id="road" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3e3e38"/>
      <stop offset="1" stop-color="#2a2a25"/>
    </linearGradient>
    <linearGradient id="wallR" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#7a5228"/>
      <stop offset="1" stop-color="#5c3c1a"/>
    </linearGradient>
    <linearGradient id="wallL" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#9a7040"/>
      <stop offset="1" stop-color="#7a5028"/>
    </linearGradient>
  </defs>

  <!-- Background plate -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <rect x="14" y="14" width="484" height="484" rx="84" fill="none" stroke="#41542a" stroke-width="2" opacity="0.8"/>

  <!-- ============ TOP: REAL-WORLD MAP ============ -->
  <g transform="translate(76, 58)">
    <!-- Paper -->
    <rect x="0" y="0" width="360" height="168" rx="8" fill="url(#paper)"/>
    <!-- Paper shadow inside -->
    <rect x="0" y="0" width="360" height="168" rx="8" fill="none" stroke="#8a7440" stroke-width="2" opacity="0.5"/>

    <!-- Streets -->
    <g stroke="#9d8a54" stroke-linecap="square" opacity="0.75">
      <line x1="0" y1="52" x2="360" y2="52" stroke-width="7"/>
      <line x1="0" y1="112" x2="360" y2="112" stroke-width="7"/>
      <line x1="88" y1="0" x2="88" y2="168" stroke-width="5"/>
      <line x1="196" y1="0" x2="196" y2="168" stroke-width="5"/>
      <line x1="286" y1="0" x2="286" y2="168" stroke-width="5"/>
    </g>

    <!-- Building footprints -->
    <g fill="#86723f" opacity="0.6">
      <rect x="14" y="10" width="60" height="32"/>
      <rect x="100" y="10" width="80" height="32"/>
      <rect x="208" y="10" width="60" height="32"/>
      <rect x="298" y="10" width="50" height="32"/>
      <rect x="14" y="62" width="60" height="40"/>
      <rect x="100" y="62" width="42" height="40"/>
      <rect x="154" y="62" width="34" height="40"/>
      <rect x="208" y="62" width="60" height="40"/>
      <rect x="298" y="62" width="50" height="40"/>
      <rect x="14" y="122" width="60" height="36"/>
      <rect x="208" y="122" width="78" height="36"/>
      <rect x="298" y="122" width="50" height="36"/>
    </g>

    <!-- River -->
    <path d="M 0 146 Q 80 128, 160 146 T 360 140" stroke="#4f7591" stroke-width="11" fill="none" stroke-linecap="round" opacity="0.85"/>
    <path d="M 0 146 Q 80 128, 160 146 T 360 140" stroke="#89a9c4" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.6"/>

    <!-- Compass badge -->
    <g transform="translate(332, 28)">
      <circle cx="0" cy="0" r="14" fill="#c9b378" stroke="#4a3a1a" stroke-width="1.5"/>
      <path d="M 0 -10 L 4 0 L 0 10 L -4 0 Z" fill="#4a3a1a"/>
      <path d="M 0 -10 L 2 0 L 0 0 Z" fill="#efe0b0"/>
    </g>

    <!-- Selection rectangle (area being converted) -->
    <g>
      <rect x="94" y="56" width="108" height="60" fill="#d8552a" fill-opacity="0.18" stroke="#d8552a" stroke-width="3" stroke-dasharray="7 4"/>
      <g fill="#d8552a" stroke="#3a1408" stroke-width="1.5">
        <circle cx="94" cy="56" r="5.5"/>
        <circle cx="202" cy="56" r="5.5"/>
        <circle cx="94" cy="116" r="5.5"/>
        <circle cx="202" cy="116" r="5.5"/>
      </g>
    </g>
  </g>

  <!-- ============ MIDDLE: CONVERSION ARROW ============ -->
  <g transform="translate(256, 256)">
    <g stroke="#d8a22e" stroke-width="7" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <path d="M -32 -10 L 0 18 L 32 -10"/>
      <path d="M -32 8 L 0 36 L 32 8"/>
    </g>
  </g>

  <!-- ============ BOTTOM: ISOMETRIC PZ TILES ============ -->
  <!-- Grid is 4x4. Tile half-width 36, half-height 18.
       Center of tile (c,r) in local coords = ((c-r)*36, 18 + (c+r)*18)
       Drawn back-to-front by c+r ascending. -->
  <g transform="translate(256, 318)" stroke="#1a2008" stroke-width="1.25" stroke-linejoin="round">

    <!-- (0,0) grass  center(0,18) -->
    <path d="M 0 0 L 36 18 L 0 36 L -36 18 Z" fill="url(#grass)"/>

    <!-- (1,0) grass + BUILDING A  center(36,36) -->
    <path d="M 36 18 L 72 36 L 36 54 L 0 36 Z" fill="url(#grass)"/>
    <!-- (0,1) grass  center(-36,36) -->
    <path d="M -36 18 L 0 36 L -36 54 L -72 36 Z" fill="url(#grass)"/>

    <!-- Building A on (1,0): base center (36,36), wall height 34 -->
    <!-- Left face -->
    <path d="M 36 54 L 0 36 L 0 2 L 36 20 Z" fill="url(#wallL)"/>
    <!-- Right face -->
    <path d="M 36 54 L 72 36 L 72 2 L 36 20 Z" fill="url(#wallR)"/>
    <!-- Roof diamond -->
    <path d="M 36 -14 L 72 2 L 36 20 L 0 2 Z" fill="#6c2a1c"/>
    <!-- Roof highlight line -->
    <path d="M 36 -14 L 36 20" stroke="#4a1810" stroke-width="1.25" fill="none"/>
    <!-- Window hint on right face -->
    <rect x="46" y="26" width="12" height="10" fill="#2a1a10" opacity="0.85"/>

    <!-- (2,0) grass center(72,54) -->
    <path d="M 72 36 L 108 54 L 72 72 L 36 54 Z" fill="url(#grass)"/>
    <!-- (1,1) grass center(0,54) -->
    <path d="M 0 36 L 36 54 L 0 72 L -36 54 Z" fill="url(#grass)"/>
    <!-- (0,2) road center(-72,54) -->
    <path d="M -72 36 L -36 54 L -72 72 L -108 54 Z" fill="url(#road)"/>

    <!-- (3,0) grass center(108,72) -->
    <path d="M 108 54 L 144 72 L 108 90 L 72 72 Z" fill="url(#grass)"/>
    <!-- (2,1) grass center(36,72) -->
    <path d="M 36 54 L 72 72 L 36 90 L 0 72 Z" fill="url(#grass)"/>
    <!-- (1,2) road center(-36,72) -->
    <path d="M -36 54 L 0 72 L -36 90 L -72 72 Z" fill="url(#road)"/>
    <!-- (0,3) grass center(-108,72) -->
    <path d="M -108 54 L -72 72 L -108 90 L -144 72 Z" fill="url(#grass)"/>

    <!-- (3,1) grass center(72,90) -->
    <path d="M 72 72 L 108 90 L 72 108 L 36 90 Z" fill="url(#grass)"/>
    <!-- (2,2) road center(0,90) -->
    <path d="M 0 72 L 36 90 L 0 108 L -36 90 Z" fill="url(#road)"/>
    <!-- (1,3) grass center(-72,90) -->
    <path d="M -72 72 L -36 90 L -72 108 L -108 90 Z" fill="url(#grass)"/>

    <!-- Road dashed center line along the row=2 diagonal -->
    <g stroke="#c9a73d" stroke-width="2.25" stroke-linecap="round" opacity="0.9">
      <line x1="-90" y1="45" x2="-78" y2="51"/>
      <line x1="-54" y1="63" x2="-42" y2="69"/>
      <line x1="-18" y1="81" x2="-6" y2="87"/>
      <line x1="18" y1="99" x2="30" y2="105"/>
    </g>

    <!-- (3,2) road center(36,108) -->
    <path d="M 36 90 L 72 108 L 36 126 L 0 108 Z" fill="url(#road)"/>
    <!-- (2,3) grass + BUILDING B center(-36,108) -->
    <path d="M -36 90 L 0 108 L -36 126 L -72 108 Z" fill="url(#grass)"/>

    <!-- Building B on (2,3): base center (-36,108), wall height 28 -->
    <path d="M -36 126 L -72 108 L -72 80 L -36 98 Z" fill="url(#wallL)"/>
    <path d="M -36 126 L 0 108 L 0 80 L -36 98 Z" fill="url(#wallR)"/>
    <path d="M -36 62 L 0 80 L -36 98 L -72 80 Z" fill="#6c2a1c"/>
    <path d="M -36 62 L -36 98" stroke="#4a1810" stroke-width="1.25" fill="none"/>
    <rect x="-26" y="104" width="10" height="10" fill="#2a1a10" opacity="0.85"/>

    <!-- Continue road dashed line on the far side -->
    <g stroke="#c9a73d" stroke-width="2.25" stroke-linecap="round" opacity="0.9">
      <line x1="42" y1="111" x2="54" y2="117"/>
    </g>

    <!-- (3,3) grass center(0,126) -->
    <path d="M 0 108 L 36 126 L 0 144 L -36 126 Z" fill="url(#grass)"/>

    <!-- Grass speckles across grass tiles -->
    <g fill="#7a8d46" opacity="0.65" stroke="none">
      <circle cx="-14" cy="20" r="1.3"/>
      <circle cx="20" cy="28" r="1.3"/>
      <circle cx="56" cy="42" r="1.3"/>
      <circle cx="-58" cy="42" r="1.3"/>
      <circle cx="-20" cy="52" r="1.3"/>
      <circle cx="14" cy="60" r="1.3"/>
      <circle cx="92" cy="78" r="1.3"/>
      <circle cx="50" cy="82" r="1.3"/>
      <circle cx="-96" cy="80" r="1.3"/>
      <circle cx="-58" cy="96" r="1.3"/>
      <circle cx="-20" cy="116" r="1.3"/>
      <circle cx="16" cy="134" r="1.3"/>
    </g>
  </g>

</svg>
