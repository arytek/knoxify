<svg viewBox="0 0 1280 640" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Knoxify cover">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2a3418"/>
      <stop offset="0.55" stop-color="#1a2210"/>
      <stop offset="1" stop-color="#0d1208"/>
    </linearGradient>
    <linearGradient id="paper" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#dcc892"/>
      <stop offset="1" stop-color="#ae9a60"/>
    </linearGradient>
    <linearGradient id="grass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#617330"/>
      <stop offset="1" stop-color="#475626"/>
    </linearGradient>
    <linearGradient id="road" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3e3e38"/>
      <stop offset="1" stop-color="#2a2a25"/>
    </linearGradient>
    <linearGradient id="wallR" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#7a5228"/>
      <stop offset="1" stop-color="#5c3c1a"/>
    </linearGradient>
    <linearGradient id="wallL" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#9a7040"/>
      <stop offset="1" stop-color="#7a5028"/>
    </linearGradient>
    <linearGradient id="wordmarkFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f2e6b6"/>
      <stop offset="1" stop-color="#cfb068"/>
    </linearGradient>
    <radialGradient id="spot" cx="0.5" cy="0.5" r="0.7">
      <stop offset="0" stop-color="#5a6b2c" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#5a6b2c" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#3a4a22" stroke-width="0.6" opacity="0.35"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1280" height="640" fill="url(#bg)"/>
  <rect width="1280" height="640" fill="url(#grid)"/>
  <ellipse cx="900" cy="340" rx="520" ry="320" fill="url(#spot)"/>

  <!-- Border -->
  <rect x="16" y="16" width="1248" height="608" rx="14" fill="none" stroke="#41542a" stroke-width="1.5" opacity="0.7"/>
  <rect x="24" y="24" width="1232" height="592" rx="10" fill="none" stroke="#41542a" stroke-width="0.8" opacity="0.35"/>

  <!-- ========== LEFT SIDE: WORDMARK + TAGLINE ========== -->
  <g transform="translate(72, 210)">
    <!-- Small tag above -->
    <g transform="translate(4, -52)">
      <rect x="0" y="0" width="11" height="11" fill="#d8a22e"/>
      <text x="24" y="10" font-family="Consolas, 'Courier New', monospace" font-size="15" font-weight="700" fill="#d8a22e" letter-spacing="3.5">PROJECT ZOMBOID MAP TOOL</text>
    </g>

    <!-- Wordmark: Knoxify -->
    <text x="0" y="108" font-family="Impact, 'Arial Black', 'Helvetica Neue', sans-serif" font-size="148" font-weight="900" fill="url(#wordmarkFill)" letter-spacing="-2">Knoxify</text>
    <!-- Wordmark shadow offset (behind) done via duplicate - actually do this properly: move the main above so it's on top of a shadow -->

    <!-- Tagline -->
    <text x="4" y="158" font-family="Georgia, 'Times New Roman', serif" font-style="italic" font-size="26" fill="#c9d6a8">Turn any place on Earth into a Project Zomboid map.</text>

    <!-- Feature chips -->
    <g transform="translate(4, 200)" font-family="Consolas, 'Courier New', monospace" font-size="14" font-weight="700" fill="#dcc892">
      <g>
        <rect x="0" y="0" width="160" height="32" rx="16" fill="#2a3418" stroke="#617330" stroke-width="1.5"/>
        <text x="16" y="21">OpenStreetMap</text>
      </g>
      <g transform="translate(176, 0)">
        <rect x="0" y="0" width="156" height="32" rx="16" fill="#2a3418" stroke="#617330" stroke-width="1.5"/>
        <text x="16" y="21">WorldEd-ready</text>
      </g>
      <g transform="translate(348, 0)">
        <rect x="0" y="0" width="128" height="32" rx="16" fill="#2a3418" stroke="#617330" stroke-width="1.5"/>
        <text x="16" y="21">Spawn maps</text>
      </g>
    </g>
  </g>

  <!-- ========== RIGHT SIDE: MAP → ISO VISUAL ========== -->
  <g transform="translate(760, 88)">

    <!-- Real-world map (top) -->
    <g transform="translate(0, 0)">
      <rect x="0" y="0" width="440" height="200" rx="10" fill="url(#paper)"/>
      <rect x="0" y="0" width="440" height="200" rx="10" fill="none" stroke="#8a7440" stroke-width="2" opacity="0.5"/>

      <!-- Streets -->
      <g stroke="#9d8a54" stroke-linecap="square" opacity="0.75">
        <line x1="0" y1="62" x2="440" y2="62" stroke-width="8"/>
        <line x1="0" y1="134" x2="440" y2="134" stroke-width="8"/>
        <line x1="108" y1="0" x2="108" y2="200" stroke-width="6"/>
        <line x1="238" y1="0" x2="238" y2="200" stroke-width="6"/>
        <line x1="348" y1="0" x2="348" y2="200" stroke-width="6"/>
      </g>

      <!-- Buildings -->
      <g fill="#86723f" opacity="0.6">
        <rect x="16" y="12" width="76" height="38"/>
        <rect x="122" y="12" width="96" height="38"/>
        <rect x="252" y="12" width="76" height="38"/>
        <rect x="362" y="12" width="62" height="38"/>
        <rect x="16" y="74" width="76" height="48"/>
        <rect x="122" y="74" width="50" height="48"/>
        <rect x="186" y="74" width="42" height="48"/>
        <rect x="252" y="74" width="76" height="48"/>
        <rect x="362" y="74" width="62" height="48"/>
        <rect x="16" y="146" width="76" height="42"/>
        <rect x="252" y="146" width="94" height="42"/>
        <rect x="362" y="146" width="62" height="42"/>
      </g>

      <!-- River -->
      <path d="M 0 172 Q 100 150, 200 172 T 440 164" stroke="#4f7591" stroke-width="13" fill="none" stroke-linecap="round" opacity="0.85"/>
      <path d="M 0 172 Q 100 150, 200 172 T 440 164" stroke="#89a9c4" stroke-width="4" fill="none" stroke-linecap="round" opacity="0.55"/>

      <!-- Compass -->
      <g transform="translate(406, 30)">
        <circle cx="0" cy="0" r="16" fill="#c9b378" stroke="#4a3a1a" stroke-width="1.5"/>
        <path d="M 0 -12 L 4 0 L 0 12 L -4 0 Z" fill="#4a3a1a"/>
        <path d="M 0 -12 L 2 0 L 0 0 Z" fill="#efe0b0"/>
      </g>

      <!-- Selection rectangle -->
      <rect x="116" y="68" width="128" height="72" fill="#d8552a" fill-opacity="0.18" stroke="#d8552a" stroke-width="3.5" stroke-dasharray="8 5"/>
      <g fill="#d8552a" stroke="#3a1408" stroke-width="1.5">
        <circle cx="116" cy="68" r="6.5"/>
        <circle cx="244" cy="68" r="6.5"/>
        <circle cx="116" cy="140" r="6.5"/>
        <circle cx="244" cy="140" r="6.5"/>
      </g>
    </g>

    <!-- Conversion arrow (double chevron pointing down) -->
    <g transform="translate(220, 230)" stroke="#d8a22e" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <path d="M -36 -12 L 0 20 L 36 -12"/>
      <path d="M -36 10 L 0 42 L 36 10"/>
    </g>

    <!-- Isometric chunk (bottom) -->
    <g transform="translate(220, 328)" stroke="#1a2008" stroke-width="1.25" stroke-linejoin="round">
      <!-- Tiles back-to-front, 4x4 grid, half-w 40, half-h 20 -->

      <!-- r+c = 0 -->
      <path d="M 0 0 L 40 20 L 0 40 L -40 20 Z" fill="url(#grass)"/>

      <!-- r+c = 1 -->
      <path d="M 40 20 L 80 40 L 40 60 L 0 40 Z" fill="url(#grass)"/>
      <path d="M -40 20 L 0 40 L -40 60 L -80 40 Z" fill="url(#grass)"/>

      <!-- Building on (1,0) — base (40,40), height 38 -->
      <path d="M 40 60 L 0 40 L 0 2 L 40 22 Z" fill="url(#wallL)"/>
      <path d="M 40 60 L 80 40 L 80 2 L 40 22 Z" fill="url(#wallR)"/>
      <path d="M 40 -16 L 80 2 L 40 22 L 0 2 Z" fill="#6c2a1c"/>
      <path d="M 40 -16 L 40 22" stroke="#4a1810" stroke-width="1.25" fill="none"/>
      <rect x="50" y="30" width="14" height="11" fill="#2a1a10" opacity="0.85"/>

      <!-- r+c = 2 -->
      <path d="M 80 40 L 120 60 L 80 80 L 40 60 Z" fill="url(#grass)"/>
      <path d="M 0 40 L 40 60 L 0 80 L -40 60 Z" fill="url(#grass)"/>
      <path d="M -80 40 L -40 60 L -80 80 L -120 60 Z" fill="url(#road)"/>

      <!-- r+c = 3 -->
      <path d="M 120 60 L 160 80 L 120 100 L 80 80 Z" fill="url(#grass)"/>
      <path d="M 40 60 L 80 80 L 40 100 L 0 80 Z" fill="url(#grass)"/>
      <path d="M -40 60 L 0 80 L -40 100 L -80 80 Z" fill="url(#road)"/>
      <path d="M -120 60 L -80 80 L -120 100 L -160 80 Z" fill="url(#grass)"/>

      <!-- r+c = 4 -->
      <path d="M 80 80 L 120 100 L 80 120 L 40 100 Z" fill="url(#grass)"/>
      <path d="M 0 80 L 40 100 L 0 120 L -40 100 Z" fill="url(#road)"/>
      <path d="M -80 80 L -40 100 L -80 120 L -120 100 Z" fill="url(#grass)"/>

      <!-- Road dashed center line -->
      <g stroke="#c9a73d" stroke-width="2.5" stroke-linecap="round" opacity="0.9">
        <line x1="-100" y1="50" x2="-86" y2="57"/>
        <line x1="-60" y1="70" x2="-46" y2="77"/>
        <line x1="-20" y1="90" x2="-6" y2="97"/>
        <line x1="20" y1="110" x2="34" y2="117"/>
      </g>

      <!-- r+c = 5 -->
      <path d="M 40 100 L 80 120 L 40 140 L 0 120 Z" fill="url(#road)"/>
      <path d="M -40 100 L 0 120 L -40 140 L -80 120 Z" fill="url(#grass)"/>

      <!-- Building on (2,3) — base (-40,120), height 32 -->
      <path d="M -40 140 L -80 120 L -80 88 L -40 108 Z" fill="url(#wallL)"/>
      <path d="M -40 140 L 0 120 L 0 88 L -40 108 Z" fill="url(#wallR)"/>
      <path d="M -40 68 L 0 88 L -40 108 L -80 88 Z" fill="#6c2a1c"/>
      <path d="M -40 68 L -40 108" stroke="#4a1810" stroke-width="1.25" fill="none"/>
      <rect x="-28" y="116" width="12" height="11" fill="#2a1a10" opacity="0.85"/>

      <!-- Additional dashes on far side of road -->
      <g stroke="#c9a73d" stroke-width="2.5" stroke-linecap="round" opacity="0.9">
        <line x1="46" y1="123" x2="60" y2="130"/>
      </g>

      <!-- r+c = 6 -->
      <path d="M 0 120 L 40 140 L 0 160 L -40 140 Z" fill="url(#grass)"/>

      <!-- Grass speckles -->
      <g fill="#7a8d46" opacity="0.65" stroke="none">
        <circle cx="-16" cy="22" r="1.4"/>
        <circle cx="22" cy="30" r="1.4"/>
        <circle cx="62" cy="46" r="1.4"/>
        <circle cx="-64" cy="46" r="1.4"/>
        <circle cx="-22" cy="58" r="1.4"/>
        <circle cx="16" cy="66" r="1.4"/>
        <circle cx="100" cy="86" r="1.4"/>
        <circle cx="56" cy="92" r="1.4"/>
        <circle cx="-140" cy="88" r="1.4"/>
        <circle cx="-64" cy="108" r="1.4"/>
        <circle cx="-22" cy="130" r="1.4"/>
        <circle cx="18" cy="150" r="1.4"/>
      </g>
    </g>
  </g>

  <!-- Small footer text -->
  <g font-family="Consolas, 'Courier New', monospace" font-size="13" fill="#7a8d46" opacity="0.85">
    <text x="72" y="580">github.com / knoxify</text>
    <text x="1208" y="580" text-anchor="end">v1.0</text>
  </g>
</svg>
